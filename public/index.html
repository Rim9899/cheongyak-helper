function calcGajeom(u){
  const hlT=[{y:0,s:0},{y:1,s:2},{y:2,s:4},{y:3,s:6},{y:4,s:8},{y:5,s:10},{y:6,s:12},{y:7,s:14},{y:8,s:16},{y:9,s:18},{y:10,s:20},{y:11,s:22},{y:12,s:24},{y:13,s:26},{y:14,s:28},{y:15,s:30},{y:99,s:32}];
  const dpT=[{c:0,s:5},{c:1,s:10},{c:2,s:15},{c:3,s:20},{c:4,s:25},{c:5,s:30},{c:99,s:35}];
  const svT=[{m:6,s:1},{m:12,s:2},{m:24,s:3},{m:36,s:4},{m:48,s:5},{m:60,s:6},{m:72,s:7},{m:84,s:8},{m:96,s:9},{m:108,s:10},{m:120,s:11},{m:132,s:12},{m:144,s:13},{m:156,s:14},{m:168,s:15},{m:9999,s:17}];
  const yrs=u.homelessYears||0;
  const hl=[...hlT].reverse().find(r=>yrs>=r.y)?.s||0;
  const dep=u.dependents||0;
  const dp=[...dpT].reverse().find(r=>dep>=r.c)?.s||5;
  const months=(u.savingsYears||0)*12+(u.savingsMonths||0);
  const sv=[...svT].reverse().find(r=>months>=r.m)?.s||1;
  return{hl,dp,sv,total:hl+dp+sv};
}
function incomeCheck(monthly,fam,pct){
  const base=URBAN_INCOME[Math.min(fam,6)]||URBAN_INCOME[6];
  const limit=base*(pct/100);
  return{ok:monthly<=limit,limit:Math.round(limit),ratio:+(monthly/base*100).toFixed(1)};
}

[공고문 무주택 조건 발췌]
${annContent||'(공고문을 가져올 수 없었습니다)'}

function ApiKeyGate({onComplete}){
  const [key,setKey]=useState('');
  const [show,setShow]=useState(false);
  const [err,setErr]=useState('');
  const [testing,setTesting]=useState(false);

  const validate=async()=>{
    const k=key.trim();
    if(!k){setErr('API 키를 입력해주세요.');return;}
    if(!k.startsWith('sk-ant-')){setErr('올바른 Claude API 키 형식이 아닙니다. (sk-ant- 로 시작)');return;}
    setTesting(true);setErr('');
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:10,messages:[{role:'user',content:'hi'}]})
      });
      if(r.status===401){setErr('유효하지 않은 API 키입니다. 키를 다시 확인해주세요.');return;}
      if(!r.ok){const e=await r.json();setErr(e.error?.message||'API 오류: '+r.status);return;}
      onComplete(k);
    }catch(e){
      setErr('연결 오류: '+e.message);
    }finally{setTesting(false);}
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24,background:'var(--ink)'}}>
      <div style={{width:'100%',maxWidth:460}} className="up">

          <div style={{fontFamily:"'Noto Serif KR',serif",fontSize:30,fontWeight:700,color:'var(--sky)',letterSpacing:'-0.5px',marginBottom:8}}>청약도우미</div>
          <div style={{color:'var(--dust3)',fontSize:14}}>AI가 내 조건에 맞는 청약을 찾아드립니다</div>
        </div>

        <div className="card">
          {/* 안내 헤더 */}
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
            <div style={{width:36,height:36,borderRadius:10,background:'rgba(74,144,245,.12)',border:'1px solid rgba(74,144,245,.25)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <ISpark c={18} col="var(--sky)"/>
            </div>
            <div>
              <div style={{fontWeight:700,fontSize:16}}>Claude API 키 입력</div>
              <div style={{fontSize:12,color:'var(--dust3)',marginTop:1}}>AI 자격 분석 · 챗봇 Q&A에 사용됩니다</div>
            </div>
          </div>

          <div className="divider"/>

          {/* 발급 안내 */}
          <div style={{padding:'11px 13px',background:'rgba(74,144,245,.05)',border:'1px solid rgba(74,144,245,.12)',borderRadius:10,marginBottom:18,fontSize:12,color:'var(--dust2)',lineHeight:1.8}}>
            1. <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:'var(--sky)',fontWeight:600}}>console.anthropic.com</a> 접속<br/>
            2. <strong style={{color:'var(--dust)'}}>API Keys</strong> 메뉴 → <strong style={{color:'var(--dust)'}}>Create Key</strong> 클릭<br/>
            3. 생성된 <code style={{background:'var(--ink3)',padding:'1px 5px',borderRadius:4,fontSize:11}}>sk-ant-...</code> 키를 아래에 붙여넣기
          </div>

          {/* 키 입력 */}
          <div className="fi" style={{marginBottom:14}}>
            <label className="fl">Claude API 키</label>
            <div style={{position:'relative'}}>
              <input
                className="inp"
                type={show?'text':'password'}
                placeholder="sk-ant-api03-..."
                value={key}
                onChange={e=>{setKey(e.target.value);setErr('');}}
                onKeyDown={e=>e.key==='Enter'&&validate()}
                style={{paddingRight:42,fontSize:13}}
                autoFocus
              />
              <button onClick={()=>setShow(s=>!s)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',color:'var(--dust3)',padding:4,cursor:'pointer'}}>
                {show?<IEyeOff c={14}/>:<IEye c={14}/>}
              </button>
            </div>
          </div>

          {/* 오류 메시지 */}
          {err&&(
            <div style={{padding:'9px 12px',background:'rgba(240,96,96,.08)',border:'1px solid rgba(240,96,96,.2)',borderRadius:8,fontSize:12,color:'var(--ruby)',marginBottom:14,display:'flex',alignItems:'center',gap:6}}>
              <IX c={13} col="var(--ruby)"/>{err}
            </div>
          )}

          {/* 확인 버튼 */}
          <button
            className="btn btn-sky"
            onClick={validate}
            disabled={testing}
            style={{width:'100%',justifyContent:'center',fontSize:14,padding:'12px',opacity:testing?0.7:1}}
          >
            {testing
              ? <><ILoader c={15} col="#fff"/>키 확인 중…</>
              : <><ICheck c={15} col="#fff"/>확인하고 시작하기</>
            }
          </button>

          {/* 면책 */}
          <div style={{marginTop:14,fontSize:11,color:'var(--dust3)',lineHeight:1.7,textAlign:'center'}}>
            🔒 키는 이 브라우저에만 저장되며 외부 서버로 전송되지 않습니다<br/>
            ⚠️ AI 분석 결과는 참고용입니다 — 최종 확인은 <a href="https://applyhome.co.kr" target="_blank" rel="noreferrer" style={{color:'var(--sky)'}}>청약홈</a>에서
          </div>
        </div>
      </div>
    </div>
  );
}

function filterLargestPoly(f){
  if(!f||!f.geometry)return null;
  if(f.geometry.type==='Polygon')return f;
  if(f.geometry.type==='MultiPolygon'){
    if(!f.geometry.coordinates.length)return null;
    let best=f.geometry.coordinates[0],bestA=0;
    f.geometry.coordinates.forEach(poly=>{
      if(typeof d3==='undefined')return;
      const a=d3.geoArea({type:'Feature',geometry:{type:'Polygon',coordinates:poly}});
      if(a>bestA){bestA=a;best=poly;}
    });
    return{...f,geometry:{...f.geometry,coordinates:[best]}};
  }
  return f;
}
function RegionMap({selected,onToggleDistrict,onToggleAll}){
  const [drill,setDrill]=useState(null);
  const [geoP,setGeoP]=useState(null);
  const [geoM,setGeoM]=useState(null);
  const [loading,setLoading]=useState(true);
  const [hov,setHov]=useState(null);
  const [viewMode,setViewMode]=useState('map');
  const [expSido,setExpSido]=useState({});
  useEffect(()=>{
    if(_geoData.prov&&_geoData.muni){setGeoP(_geoData.prov);setGeoM(_geoData.muni);setLoading(false);return;}
    Promise.all([
      _geoData.prov?Promise.resolve(_geoData.prov):
        fetch('https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2013/json/skorea_provinces_geo_simple.json')
          .then(r=>r.json()).then(d=>{_geoData.prov=d;return d;}),
      _geoData.muni?Promise.resolve(_geoData.muni):
        fetch('https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2013/json/skorea_municipalities_geo_simple.json')
          .then(r=>r.json()).then(d=>{_geoData.muni=d;return d;})
    ]).then(([p,m])=>{setGeoP(p);setGeoM(m);setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  const toggleMode=()=>{setViewMode(m=>m==='map'?'text':'map');setDrill(null);setHov(null);};
  const ModeBtn=()=>(
    <button onClick={toggleMode} style={{display:'flex',alignItems:'center',gap:4,fontSize:10,padding:'3px 8px',borderRadius:5,border:'1px solid rgba(100,120,170,.4)',background:'rgba(74,144,245,.1)',color:'#7ab8ff',cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
      {viewMode==='map'?'≡ 목록':'🗺 지도'}
    </button>
  );

  if(loading)return<div style={{height:280,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dust3)',fontSize:12,flexDirection:'column',gap:8}}><div style={{width:20,height:20,border:'2px solid var(--line2)',borderTopColor:'var(--sky)',borderRadius:'50%',animation:'spin .9s linear infinite'}}/>지도 데이터 로딩 중…</div>;

  /* ── 텍스트 목록 모드 ── */
  if(viewMode==='text'){
    return(
      <div style={{background:'#1a1f35',borderRadius:12,border:'1px solid rgba(100,120,170,.5)',overflow:'hidden'}}>
        <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(100,120,170,.3)',display:'flex',alignItems:'center',gap:6,background:'rgba(0,0,0,.2)'}}>
          <span style={{fontSize:11,fontWeight:700,color:'#b0bde0',flex:1}}>≡ 지역 목록 선택</span>
          <ModeBtn/>
        </div>
        <div style={{maxHeight:380,overflowY:'auto'}}>
          {SIDO.map(sido=>{
            const dists=DISTRICTS[sido]||[];
            const cnt=selected.filter(r=>r.startsWith(sido+' ')).length;
            const allS=dists.length>0&&cnt===dists.length;
            const isExp=!!expSido[sido];
            return(
              <div key={sido} style={{borderBottom:'1px solid rgba(100,120,170,.13)'}}>
                <div style={{display:'flex',alignItems:'center',padding:'7px 12px',cursor:'pointer',background:cnt>0?'rgba(74,144,245,.07)':'transparent',gap:6}}
                  onClick={()=>setExpSido(e=>({...e,[sido]:!e[sido]}))}>
                  <span style={{fontSize:9,color:'#5a6b8a',width:10,flexShrink:0}}>{isExp?'▼':'▶'}</span>
                  <span style={{fontSize:12,fontWeight:600,color:cnt>0?'#7ab8ff':'#b0bde0',flex:1}}>{sido}</span>
                  {cnt>0&&<span style={{fontSize:10,color:'#7ab8ff',fontWeight:700,marginRight:4}}>{cnt}/{dists.length}</span>}
                  <button onClick={e=>{e.stopPropagation();onToggleAll(sido);}} style={{fontSize:10,padding:'2px 7px',borderRadius:4,border:`1px solid ${allS?'rgba(74,144,245,.5)':'rgba(100,120,170,.4)'}`,background:allS?'rgba(74,144,245,.2)':'transparent',color:allS?'#7ab8ff':'#6a7799',cursor:'pointer',flexShrink:0}}>
                    {allS?'해제':'전체'}
                  </button>
                </div>
                {isExp&&(
                  <div style={{display:'flex',flexWrap:'wrap',gap:4,padding:'8px 12px',background:'rgba(0,0,0,.2)'}}>
                    {dists.map(d=>{
                      const sel=selected.includes(sido+' '+d);
                      return(
                        <button key={d} onClick={()=>onToggleDistrict(sido,d)}
                          style={{fontSize:10,padding:'3px 8px',borderRadius:999,cursor:'pointer',
                            border:`1px solid ${sel?'rgba(74,144,245,.6)':'rgba(100,120,170,.35)'}`,
                            background:sel?'rgba(74,144,245,.25)':'transparent',
                            color:sel?'#7ab8ff':'#8a9ab8',fontWeight:sel?700:400}}>
                          {sel?'✓ ':''}{d}
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{padding:'5px 12px',background:'rgba(0,0,0,.25)',fontSize:10,color:selected.length>0?'#7ab8ff':'#5a6b8a',fontWeight:selected.length>0?600:400}}>
          {selected.length>0?`✓ 총 ${selected.length}개 지역 선택됨`:'시/도를 클릭해 펼치세요'}
        </div>
      </div>
    );
  }

  /* ── 지도 모드: GeoJSON 필요 ── */
  if(!geoP||!geoM||typeof d3==='undefined')return<div style={{padding:16,color:'var(--dust3)',fontSize:12,textAlign:'center'}}>지도를 불러올 수 없습니다 — 인터넷 연결을 확인하세요</div>;

  /* ── 전국 뷰 ── */
  if(!drill){
    const W=320,H=470,PAD=6;
    const proj=d3.geoMercator().fitSize([W-PAD*2,H-PAD*2],geoP);
    const pg=d3.geoPath().projection(proj);
    return(
      <div style={{background:'#1a1f35',borderRadius:12,border:'1px solid rgba(100,120,170,.5)',overflow:'hidden'}}>
        <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(100,120,170,.3)',display:'flex',alignItems:'center',gap:6,background:'rgba(0,0,0,.2)'}}>
          <span style={{fontSize:11,fontWeight:700,color:'#b0bde0',flex:1}}>🗺 대한민국</span>
          <span style={{fontSize:10,color:'#6a7799'}}>시/도 클릭 → 구/시/군 선택</span>
          <ModeBtn/>
        </div>
        {hov&&<div style={{padding:'4px 12px',background:'rgba(74,144,245,.12)',borderBottom:'1px solid rgba(74,144,245,.2)',fontSize:11,color:'#7ab8ff',fontWeight:600}}>{hov} {selected.filter(r=>r.startsWith(hov+' ')).length>0?`· ${selected.filter(r=>r.startsWith(hov+' ')).length}개 선택`:''}</div>}
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}}>
          <rect x={0} y={0} width={W} height={H} fill="#1a1f35"/>
          <g transform={`translate(${PAD},${PAD})`}>
            {geoP.features.map(f=>{
              const full=f.properties.name||'';
              const sido=FULL_SIDO[full];
              if(!sido)return null;
              const ff=filterLargestPoly(f);
              if(!ff)return null;
              const cnt=selected.filter(r=>r.startsWith(sido+' ')).length;
              const dList=DISTRICTS[sido]||[];
              const allSel=dList.length>0&&cnt===dList.length;
              const hasSel=cnt>0;
              const isHov=hov===sido;
              const d=pg(ff);
              if(!d)return null;
              const [cx,cy]=pg.centroid(ff);
              const ldr=LEADER_OFFSETS[sido];
              const [ox,oy]=ldr||LABEL_SHIFT[sido]||[0,0];
              const tx=cx+ox,ty=cy+oy;
              return(
                <g key={sido} style={{cursor:'pointer'}}
                  onClick={()=>{if(dList.length<=1){if(dList[0])onToggleDistrict(sido,dList[0]);}else setDrill(sido);}}
                  onMouseEnter={()=>setHov(sido)} onMouseLeave={()=>setHov(null)}>
                  <path d={d}
                    fill={allSel?'#3d7ed4':hasSel?'#2d5fa0':isHov?'#253560':'#1e2748'}
                    stroke={'rgba(140,170,230,.55)'}
                    strokeWidth={1.5}
                    style={{transition:'fill .15s'}}
                  />
                  {!isNaN(cx)&&!isNaN(cy)&&(<>
                    {ldr&&<>
                      <circle cx={cx} cy={cy} r={2.5} fill={hasSel?'#7ab8ff':'#4a6090'} pointerEvents="none"/>
                      <line x1={cx} y1={cy} x2={tx} y2={ty} stroke={hasSel?'rgba(120,184,255,.45)':'rgba(74,96,144,.45)'} strokeWidth={0.8} strokeDasharray="2,2" pointerEvents="none"/>
                    </>}
                    <text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle"
                      fill={hasSel?'#e0eeff':isHov?'#b8ceee':'#7a8fb8'}
                      stroke="#1a1f35" strokeWidth={2.5} paintOrder="stroke"
                      fontSize={9} fontWeight={hasSel?700:500} pointerEvents="none">
                      {sido}{cnt>0?`(${cnt})`:''}
                    </text>
                  </>)}
                </g>
              );
            })}
          </g>
        </svg>
        <div style={{padding:'5px 12px',background:'rgba(0,0,0,.25)',fontSize:10,color:selected.length>0?'#7ab8ff':'#5a6b8a',fontWeight:selected.length>0?600:400}}>
          {selected.length>0?`✓ 총 ${selected.length}개 지역 선택됨`:'지역을 클릭하세요'}
        </div>
      </div>
    );
  }

  /* ── 드릴다운 뷰 ── */
  const dists=DISTRICTS[drill]||[];
  const sidoCode=SIDO_CODE[drill]||'';
  const feats=geoM.features.filter(f=>{
    const n=f.properties.name;
    const c=f.properties.code||'';
    return sidoCode?c.startsWith(sidoCode)&&dists.some(d=>n===d||n.startsWith(d)):dists.some(d=>n===d||n.startsWith(d));
  });
  const drillCnt=selected.filter(r=>r.startsWith(drill+' ')).length;
  const drillAll=drillCnt===dists.length&&dists.length>0;
  const W2=480,H2=360,PAD2=10;
  const proj2=feats.length?d3.geoMercator().fitSize([W2-PAD2*2,H2-PAD2*2],{type:'FeatureCollection',features:feats}):null;
  const pg2=proj2?d3.geoPath().projection(proj2):null;
  const fSize=Math.max(7,Math.min(11,Math.round(190/Math.sqrt(feats.length+1))));
  const hoverOnly=HOVER_ONLY_DRILL.has(drill);
  return(
    <div style={{background:'#1a1f35',borderRadius:12,border:'1px solid rgba(100,120,170,.5)',overflow:'hidden'}}>
      <div style={{padding:'7px 12px',borderBottom:'1px solid rgba(100,120,170,.3)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',background:'rgba(0,0,0,.2)'}}>
        <button onClick={()=>{setDrill(null);setHov(null);}} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#7ab8ff',cursor:'pointer',padding:'2px 8px',borderRadius:5,border:'1px solid rgba(74,144,245,.35)',background:'rgba(74,144,245,.1)'}}>← 전국</button>
        <span style={{fontWeight:700,fontSize:12,color:'#7ab8ff'}}>{drill}</span>
        {hoverOnly&&<span style={{fontSize:9,color:'#5a6b8a'}}>마우스오버로 지역명 확인</span>}
        <button onClick={()=>onToggleAll(drill)} style={{fontSize:11,padding:'2px 8px',borderRadius:5,border:'1px solid rgba(100,120,170,.4)',background:drillAll?'rgba(74,144,245,.2)':'transparent',color:drillAll?'#7ab8ff':'#6a7799',cursor:'pointer',fontWeight:drillAll?700:400,marginLeft:'auto'}}>{drillAll?'전체 해제':'전체 선택'}</button>
        <span style={{fontSize:10,color:'#6a7799'}}>{drillCnt}/{dists.length}</span>
        <ModeBtn/>
      </div>
      {hov&&<div style={{padding:'4px 12px',background:'rgba(74,144,245,.12)',borderBottom:'1px solid rgba(74,144,245,.2)',fontSize:11,color:'#7ab8ff',fontWeight:600}}>{drill} {hov}</div>}
      {pg2&&feats.length?(
        <svg viewBox={`0 0 ${W2} ${H2}`} style={{width:'100%',height:'auto',display:'block'}}>
          <rect x={0} y={0} width={W2} height={H2} fill="#1a1f35"/>
          <g transform={`translate(${PAD2},${PAD2})`}>
            {feats.map(f=>{
              const name=f.properties.name;
              const reg=drill+' '+name;
              const sel=selected.includes(reg);
              const isHov=hov===name;
              const d=pg2(f);
              if(!d)return null;
              const [cx,cy]=pg2.centroid(f);
              return(
                <g key={name}>
                  <path d={d}
                    fill={sel?'#3a7ed6':isHov?'#2a5898':'#1e2d5a'}
                    stroke={'rgba(170,200,255,.5)'}
                    strokeWidth={1.5}
                    style={{cursor:'pointer',transition:'fill .15s'}}
                    onMouseEnter={()=>setHov(name)} onMouseLeave={()=>setHov(null)}
                    onClick={()=>onToggleDistrict(drill,name)}
                  />
                  {(!hoverOnly||isHov)&&!isNaN(cx)&&!isNaN(cy)&&(
                    <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle"
                      fill={sel?'#e4f0ff':isHov?'#c0d8f8':'#7a9acc'}
                      stroke="#1a1f35" strokeWidth={2} paintOrder="stroke"
                      fontSize={fSize} fontWeight={sel?700:500} pointerEvents="none">
                      {name}
                    </text>
                  )}
                </g>
              );
            })}
          </g>
        </svg>
      ):(
        <div style={{padding:24,textAlign:'center',color:'#5a6b8a',fontSize:11}}>이 지역 지도 데이터가 없습니다</div>
      )}
      <div style={{padding:'5px 12px',background:'rgba(0,0,0,.25)',display:'flex',gap:12,fontSize:10}}>
        <span style={{color:'#5a6b8a'}}>클릭: 선택/해제</span>
        <span style={{color:'#7ab8ff',fontWeight:600}}>{drillCnt}개 선택</span>
      </div>
    </div>
  );
}

/* ═══════ LOAN CALCULATOR ═══════ */
function LoanCalc({targetLoanAmount,onSetTarget}){
  const [amt,setAmt]=useState(30000);
  const [rate,setRate]=useState(3.8);
  const [term,setTerm]=useState(30);
  const [method,setMethod]=useState('equal');
  const r=rate/100/12,n=term*12,P=amt*10000;
  let monthly,totalInt;
  if(method==='equal'){monthly=r?P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):P/n;totalInt=monthly*n-P;}
  else if(method==='principal'){monthly=P/n+P*r;totalInt=r*P*(n+1)/2;}
  else{monthly=P*r;totalInt=monthly*n;}
  const fmtM=v=>(Math.round(v/10000)).toLocaleString()+'만원';
  const HELP={
    equal:'원리금균등 — 매달 납입액이 동일합니다. 초기에는 이자 비중이 높고 후반에 원금 비중이 높아집니다. 관리가 쉬운 가장 일반적인 방식.',
    principal:'원금균등 — 매달 원금 상환액이 동일하고 이자는 점차 줄어듭니다. 초기 납입액이 가장 많지만 총 이자 부담이 가장 적습니다.',
    bullet:'만기일시 — 대출 기간 동안 이자만 납부하고 만기에 원금 전액을 일시 상환합니다. 월 부담이 적지만 만기에 큰 목돈이 필요합니다.'
  };
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
        <div className="fi" style={{margin:0}}><label className="fl">대출 금액</label><div style={{display:'flex',gap:5,alignItems:'center'}}><input className="inp" type="number" min={0} value={amt} onChange={e=>setAmt(+e.target.value)} style={{flex:1}}/><span style={{fontSize:11,color:'var(--dust2)',flexShrink:0}}>만원</span></div></div>
        <div className="fi" style={{margin:0}}><label className="fl">연 금리</label><div style={{display:'flex',gap:5,alignItems:'center'}}><input className="inp" type="number" step="0.1" min={0} max={30} value={rate} onChange={e=>setRate(+e.target.value)} style={{flex:1}}/><span style={{fontSize:11,color:'var(--dust2)',flexShrink:0}}>%</span></div></div>
        <div className="fi" style={{margin:0}}><label className="fl">대출 기간</label><div style={{display:'flex',gap:5,alignItems:'center'}}><input className="inp" type="number" min={1} max={50} value={term} onChange={e=>setTerm(+e.target.value)} style={{flex:1}}/><span style={{fontSize:11,color:'var(--dust2)',flexShrink:0}}>년</span></div></div>
      </div>
      <div className="fi" style={{margin:0,marginBottom:12}}>
        <label className="fl">상환 방식</label>
        <div className="choice-row"><CB label="원리금균등" active={method==='equal'} onClick={()=>setMethod('equal')}/><CB label="원금균등" active={method==='principal'} onClick={()=>setMethod('principal')}/><CB label="만기일시" active={method==='bullet'} onClick={()=>setMethod('bullet')}/></div>
        <div style={{marginTop:7,padding:'8px 11px',background:'var(--ink3)',borderRadius:8,border:'1px solid var(--line)',fontSize:11,color:'var(--dust2)',lineHeight:1.7}}>{HELP[method]}</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,padding:14,background:'var(--ink3)',borderRadius:10,border:'1px solid var(--line)',marginBottom:18}}>
        <div><div style={{fontSize:10,color:'var(--dust3)',marginBottom:5}}>{method==='principal'?'첫달 납입액':method==='bullet'?'월 이자':'월 납입액'}</div><div style={{fontSize:19,fontWeight:800,color:'var(--sky)'}}>{fmtM(monthly)}</div></div>
        <div><div style={{fontSize:10,color:'var(--dust3)',marginBottom:5}}>총 이자</div><div style={{fontSize:19,fontWeight:800,color:'var(--gold)'}}>{fmtM(totalInt)}</div></div>
        <div><div style={{fontSize:10,color:'var(--dust3)',marginBottom:5}}>총 상환액</div><div style={{fontSize:19,fontWeight:800,color:'var(--dust)'}}>{fmtM(P+totalInt)}</div></div>
      </div>
      <div style={{padding:'12px 14px',background:'rgba(74,144,245,.05)',border:'1px solid rgba(74,144,245,.15)',borderRadius:10}}>
        <label className="fl">목표 대출 금액 상한 <span style={{fontWeight:400,color:'var(--dust3)'}}>(대출로 조달 가능한 최대 금액)</span></label>
        <div style={{display:'flex',gap:8,alignItems:'center',marginTop:8}}><input className="inp" type="number" min={0} value={targetLoanAmount} onChange={e=>onSetTarget(+e.target.value)} style={{flex:1}}/><span style={{fontSize:11,color:'var(--dust2)',flexShrink:0}}>만원</span></div>
        <span className="fh">가용 현금 + 목표 대출 금액 = 실질 구매력 상한으로 AI 자격 분석에 활용됩니다</span>
      </div>
    </div>
  );
}

/* ═══════ MINI CALENDAR ═══════ */
function MiniCalendar({announcements,setPage,setDid}){
  const today=new Date();
  const [yr,setYr]=useState(today.getFullYear());
  const [mo,setMo]=useState(today.getMonth());
  const events={};
  announcements.forEach(a=>{
    const add=(date,type)=>{if(!date)return;const k=date.slice(0,10);if(!events[k])events[k]=[];events[k].push({type,name:a.name,id:a.id});};
    add(a.schedule.special,'특공');add(a.schedule.general,'청약');add(a.schedule.winner,'당첨');add(a.schedule.contract,'계약');add(a.schedule.moveIn,'입주');
  });
  const firstDow=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  const todayStr=today.toISOString().slice(0,10);
  const prevMo=()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);};
  const nextMo=()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);};
  const MONS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const TC={특공:'var(--sky)',청약:'var(--jade)',당첨:'var(--ruby)',계약:'var(--gold)',입주:'var(--dust2)'};
  const TB={특공:'rgba(74,144,245,.22)',청약:'rgba(46,201,140,.22)',당첨:'rgba(240,96,96,.2)',계약:'rgba(240,184,64,.2)',입주:'rgba(90,99,128,.2)'};
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <button onClick={prevMo} style={{padding:'3px 9px',borderRadius:6,background:'var(--ink3)',border:'1px solid var(--line)',color:'var(--dust2)',cursor:'pointer',fontSize:14,lineHeight:1}}>‹</button>
        <span style={{fontWeight:700,fontSize:13}}>{yr}년 {MONS[mo]}</span>

/* ═══════════════════════════════════════════════
   SCORE RING
═══════════════════════════════════════════════ */
function ScoreRing({score,max=84,size=80}){
  const r=size/2-5,circ=2*Math.PI*r,pct=score/max;
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--line)" strokeWidth={5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--sky)" strokeWidth={5}
        strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
        style={{transition:'stroke-dashoffset 1.2s ease'}}/>
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="middle"
        style={{transform:`rotate(90deg)`,transformOrigin:`${size/2}px ${size/2}px`,fill:'var(--dust)',fontSize:16,fontWeight:700,fontFamily:"'Noto Sans KR',sans-serif"}}>
        {score}
      </text>
    </svg>
  );
}

          {flt.region&&<button onClick={()=>setFlt(f=>({...f,region:''}))} style={{fontSize:11,color:'var(--dust3)',padding:'3px 8px',borderRadius:999,border:'1px solid var(--line)',background:'var(--ink3)',cursor:'pointer'}}>필터 해제</button>}
        </div>
      )}

      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {filtered.length===0&&<div style={{padding:'48px',textAlign:'center',color:'var(--dust3)'}}>조건에 맞는 청약이 없습니다</div>}
        {filtered.map(a=>{
          const isFav=favIds.includes(a.id);
          const prices=a.houseTypes.map(h=>h.price).filter(p=>p>0);
          const minP=prices.length?Math.min(...prices):0;
          const maxP=prices.length?Math.max(...prices):0;
          const myReg=matchRegion(a.location.sido,a.location.sigungu,regs);
          return (
            <div key={a.id} className="card" style={{cursor:'pointer',transition:'border-color .15s',position:'relative'}}
              onClick={()=>{setDid(a.id);setPage('detail');}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='var(--line2)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='var(--line)'}>
              {myReg&&<div style={{position:'absolute',top:-1,left:16,background:'var(--sky)',color:'#fff',fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:'0 0 5px 5px',letterSpacing:'.3px'}}>관심지역</div>}
              <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',gap:5,marginBottom:7}}>
                    <span className={`chip chip-${a.type==='민영'?'sky':'jade'}`}>{a.type}</span>
                    {a.restrictions.regulated&&<span className="chip chip-ruby">규제지역</span>}
                  </div>
                  <div style={{fontSize:15,fontWeight:700,marginBottom:5,lineHeight:1.3}}>{a.name}</div>
                  <div style={{display:'flex',gap:12,color:'var(--dust3)',fontSize:11}}>
                    <span style={{display:'flex',alignItems:'center',gap:3}}><IPin c={10}/>{a.location.sido} {a.location.sigungu}</span>
                    <span>총 {a.totalUnits}세대 · 최고 {a.maxFloor}층</span>
                  </div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--jade)'}}>{minP?minP===maxP?fmtN(minP)+'만':fmtN(minP)+'~'+fmtN(maxP)+'만':'공고 확인'}</div>
                  <div style={{fontSize:10,color:'var(--dust3)',marginTop:1}}>분양가</div>
                </div>
              </div>
              <div className="divider" style={{margin:'11px 0'}}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                  {a.houseTypes.map(h=><span key={h.t} className="tag">{h.t} ({h.exclArea||h.area}㎡)</span>)}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:11,color:'var(--dust3)',display:'flex',alignItems:'center',gap:3}}><ICal c={10}/>접수 {a.schedule.general}</span>
                  <button onClick={e=>{e.stopPropagation();toggle(a.id);}} style={{padding:'5px 9px',borderRadius:7,display:'flex',alignItems:'center',gap:3,background:isFav?'rgba(240,184,64,.12)':'var(--ink3)',border:`1px solid ${isFav?'rgba(240,184,64,.3)':'var(--line)'}`,color:isFav?'var(--gold)':'var(--dust3)',fontSize:11,cursor:'pointer',transition:'all .15s'}}>
                    <IStar c={11} fill={isFav?'var(--gold)':'none'} col={isFav?'var(--gold)':'currentColor'}/>{isFav?'저장됨':'저장'}
                  </button>
                  <IChevR c={12} col="var(--dust3)"/>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   DETAIL PAGE
═══════════════════════════════════════════════ */
function DetailPage({annId,user,apiKey,setPage,announcements}){
  const a=announcements.find(x=>x.id===annId);
  const [favIds,setFavIds]=useState(S.getFavs());
  const [analysis,setAnalysis]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [aiErr,setAiErr]=useState('');
  const [chatOpen,setChatOpen]=useState(false);
  const [hist,setHist]=useState([]);
  const [chatQ,setChatQ]=useState('');
  const [chatLoading,setChatLoading]=useState(false);
  const [showPay,setShowPay]=useState(false);
  const chatEnd=useRef();

  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:'smooth'})},[hist]);

  if(!a)return <div style={{padding:32,color:'var(--dust3)'}}>공고를 찾을 수 없습니다</div>;

  const isFav=favIds.includes(a.id);
  const toggle=()=>setFavIds(S.toggleFav(a.id));
  const g=calcGajeom(user);
  const minP=Math.min(...a.houseTypes.map(h=>h.price));

  const runAnalysis=async()=>{
    if(!apiKey){setAiErr('Claude API 키를 먼저 설정해주세요 (사이드바 하단)');return;}
    setAnalyzing(true);setAiErr('');
    try{setAnalysis(await aiAnalyze(apiKey,user,a));}
    catch(e){setAiErr(e.message);}
    finally{setAnalyzing(false);}
  };

  const doChat=async()=>{
    if(!chatQ.trim()||chatLoading)return;
    if(!apiKey){setHist(h=>[...h,{role:'assistant',content:'API 키를 먼저 설정해주세요.'}]);return;}
    const q=chatQ.trim();setChatQ('');
    const newH=[...hist,{role:'user',content:q}];
    setHist(newH);setChatLoading(true);
    try{const ans=await aiChat(apiKey,user,a,hist,q);setHist(h=>[...h,{role:'assistant',content:ans}]);}
    catch(e){setHist(h=>[...h,{role:'assistant',content:'오류: '+e.message}]);}
    finally{setChatLoading(false);}
  };

  const EBadge=({ok})=>ok
    ?<span style={{display:'flex',alignItems:'center',gap:3,color:'var(--jade)',fontSize:12,fontWeight:700}}><ICheck c={13} col="var(--jade)"/>자격 있음</span>
    :<span style={{display:'flex',alignItems:'center',gap:3,color:'var(--ruby)',fontSize:12,fontWeight:600}}><IX c={13} col="var(--ruby)"/>자격 없음</span>;

  return (
    <div style={{maxWidth:920,margin:'0 auto'}}>
      <div style={{padding:'14px 28px',borderBottom:'1px solid var(--line)',display:'flex',alignItems:'center',gap:14,position:'sticky',top:0,background:'rgba(13,15,20,.96)',backdropFilter:'blur(8px)',zIndex:9}}>
        <button onClick={()=>setPage('list')} style={{display:'flex',alignItems:'center',gap:5,color:'var(--dust2)',fontSize:12,cursor:'pointer'}}><IArrowLeft c={15}/>목록</button>
        <div style={{flex:1,fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.name}</div>
        <button onClick={toggle} style={{display:'flex',alignItems:'center',gap:5,padding:'6px 12px',borderRadius:8,background:isFav?'rgba(240,184,64,.12)':'var(--ink3)',border:`1px solid ${isFav?'rgba(240,184,64,.3)':'var(--line)'}`,color:isFav?'var(--gold)':'var(--dust2)',fontSize:12,fontWeight:600,cursor:'pointer'}}>
          <IStar c={12} fill={isFav?'var(--gold)':'none'} col={isFav?'var(--gold)':'currentColor'}/>{isFav?'저장됨':'저장'}
        </button>
      </div>

      <div style={{padding:'22px 28px',display:'grid',gridTemplateColumns:'1fr 340px',gap:20,alignItems:'start'}}>
        <div>
          <div className="card" style={{marginBottom:14}}>
            <div style={{display:'flex',gap:6,marginBottom:10}}>
              <span className={`chip chip-${a.type==='민영'?'sky':'jade'}`}>{a.type}주택</span>
              {a.restrictions.regulated&&<span className="chip chip-ruby">규제지역</span>}
              {a.tags.map(t=><span key={t} className="chip chip-dust">{t}</span>)}
            </div>
            <div style={{fontSize:18,fontWeight:800,marginBottom:7,lineHeight:1.3}}>{a.name}</div>
            <div style={{color:'var(--dust2)',fontSize:12,marginBottom:14,display:'flex',gap:14}}>
              <span style={{display:'flex',alignItems:'center',gap:3}}><IPin c={11}/>{a.location.address}</span>
              <span>최고 {a.maxFloor}층 · {a.buildings}개동 · 총 {a.totalUnits}세대</span>
            </div>
            <div className="stitle">청약 일정</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {[['모집공고',a.schedule.announcement],['특공접수',a.schedule.special],['일반접수',a.schedule.general],['당첨발표',a.schedule.winner],['계약',a.schedule.contract],['입주예정',a.schedule.moveIn]].map(([l,d])=>(
                <div key={l} style={{padding:'9px 11px',background:'var(--ink3)',borderRadius:9,border:'1px solid var(--line)'}}>
                  <div style={{fontSize:10,color:'var(--dust3)',marginBottom:2}}>{l}</div>
                  <div style={{fontSize:12,fontWeight:600}}>{d}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="card" style={{marginBottom:14}}>
            <div className="stitle">제한 사항</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
              {[['규제지역',a.restrictions.regulated?'해당':'비규제',a.restrictions.regulated?'ruby':'jade'],['전매제한',`${a.restrictions.resale}년`,'dust'],['재당첨제한',`${a.restrictions.reapply}년`,'dust'],['거주의무',a.restrictions.residence?`${a.restrictions.residence}년`:'없음',a.restrictions.residence?'gold':'jade']].map(([l,v,c])=>(
                <div key={l} style={{padding:'11px',background:'var(--ink3)',borderRadius:9,border:'1px solid var(--line)'}}>
                  <div style={{fontSize:10,color:'var(--dust3)',marginBottom:3}}>{l}</div>
                  <div style={{fontSize:13,fontWeight:700,color:c==='ruby'?'var(--ruby)':c==='jade'?'var(--jade)':c==='gold'?'var(--gold)':'var(--dust)'}}>{v}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="card" style={{marginBottom:14}}>
            <div className="stitle">주택형별 정보</div>
            {a.houseTypes.map(h=>(
              <div key={h.t} style={{padding:'13px',background:'var(--ink3)',borderRadius:10,border:'1px solid var(--line)',marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div><span style={{fontWeight:700,fontSize:14,marginRight:8}}>{h.t}타입</span><span style={{color:'var(--dust2)',fontSize:12}}>전용 {h.exclArea||h.area}㎡ · 공급 {h.exclArea?h.area:'-'}㎡ · {h.units>0?`${h.units}세대`:'세대수 공고 확인'}</span></div>
                  <div style={{fontSize:15,fontWeight:700,color:'var(--jade)'}}>{fmtN(h.price)}만원</div>
                </div>
              </div>
            ))}
          </div>

          <div className="card">
            <button onClick={()=>setShowPay(p=>!p)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',cursor:'pointer'}}>
              <div className="stitle" style={{margin:0}}>납부 일정 ({a.houseTypes[0]?.t}타입 기준)</div>
              {showPay?<IChevU c={14} col="var(--dust3)"/>:<IChevD c={14} col="var(--dust3)"/>}
            </button>
            {showPay&&(()=>{const h=a.houseTypes[0];if(!h||!h.price)return <div style={{padding:'14px 0',color:'var(--dust3)',fontSize:12}}>주택형 분양가 정보는 청약홈 공고문을 확인하세요.</div>;const p=h.price;return(
              <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:6}}>
                <div style={{display:'flex',justifyContent:'space-between',padding:'10px 12px',background:'var(--ink3)',borderRadius:8,border:'1px solid var(--line)'}}>
                  <span style={{fontSize:12}}>계약금 ({a.payment.down}%)</span>
                  <span style={{fontWeight:700}}>{fmtN(Math.round(p*a.payment.down/100))}만원</span>
                </div>
                {a.payment.mid.map((m,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'10px 12px',background:'var(--ink3)',borderRadius:8,border:'1px solid var(--line)'}}>
                    <span style={{fontSize:12}}>중도금 {i+1}차 ({m.r}%) — {m.d}</span>
                    <span style={{fontWeight:700}}>{fmtN(Math.round(p*m.r/100))}만원</span>
                  </div>
                ))}
                <div style={{display:'flex',justifyContent:'space-between',padding:'10px 12px',background:'rgba(74,144,245,.06)',borderRadius:8,border:'1px solid rgba(74,144,245,.2)'}}>
                  <span style={{fontSize:12}}>잔금 ({a.payment.bal}%) — 입주 시</span>
                  <span style={{fontWeight:700,color:'var(--sky)'}}>{fmtN(Math.round(p*a.payment.bal/100))}만원</span>
                </div>
              </div>
            );})()}
          </div>
        </div>

        <div style={{position:'sticky',top:60}}>
          <div className="card-sm" style={{marginBottom:12}}>
            <div className="stitle">내 현황 요약</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
              {[['가점합계',`${g.total}점`],['무주택',`${user.homelessYears||0}년`],['부양가족',`${user.dependents||0}명`],['가용현금',`${fmtN(user.availableCash)}만`]].map(([k,v])=>(
                <div key={k} style={{padding:'9px',background:'var(--ink3)',borderRadius:8,border:'1px solid var(--line)'}}>
                  <div style={{fontSize:10,color:'var(--dust3)'}}>{k}</div>
                  <div style={{fontSize:14,fontWeight:700,marginTop:1}}>{v}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="card-sm" style={{marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
              <ISpark c={15} col="var(--sky)"/>
              <span style={{fontWeight:700,fontSize:14}}>AI 자격 분석</span>
            </div>

            {!analysis&&!analyzing&&(
              <>
                <div style={{fontSize:12,color:'var(--dust2)',lineHeight:1.6,marginBottom:12}}>내 인적사항과 이 청약 조건을 AI가 종합 분석하여 자격 여부와 맞춤 조언을 제공합니다.</div>
                {aiErr&&<div style={{padding:'9px 11px',background:'rgba(240,96,96,.08)',border:'1px solid rgba(240,96,96,.2)',borderRadius:8,fontSize:11,color:'var(--ruby)',marginBottom:10}}>{aiErr}</div>}
                <button className="btn btn-sky" onClick={runAnalysis} style={{width:'100%',justifyContent:'center',fontSize:13}}>
                  <ISpark c={13}/>AI 분석 시작
                </button>
                <div style={{fontSize:10,color:'var(--dust3)',marginTop:7,textAlign:'center'}}>⚠️ 결과는 참고용 · 최종 확인은 청약홈에서</div>
              </>
            )}

            {analyzing&&(
              <div style={{textAlign:'center',padding:'18px 0'}}>
                <ILoader c={22} col="var(--sky)" s={{display:'block',margin:'0 auto 10px'}}/>
                <div style={{fontSize:12,color:'var(--dust2)'}}>공고문 확인 및 AI 분석 중…</div>
              </div>
            )}

            {analysis&&(
              <div className="up">
                <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:12}}>
                  {analysis.types?.map((t,i)=>(
                    <div key={i} style={{padding:'11px',borderRadius:9,background:t.ok?'rgba(46,201,140,.06)':'rgba(240,96,96,.05)',border:`1px solid ${t.ok?'rgba(46,201,140,.2)':'rgba(240,96,96,.15)'}`}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                        <span style={{fontSize:11,fontWeight:700}}>{t.name}</span>
                        <EBadge ok={t.ok}/>
                      </div>
                      <div style={{fontSize:10,color:'var(--dust2)',lineHeight:1.6}}>{t.point}</div>
                    </div>
                  ))}
                </div>

                {analysis.gajeom&&(
                  <div style={{padding:'10px',background:'rgba(74,144,245,.06)',border:'1px solid rgba(74,144,245,.15)',borderRadius:9,marginBottom:9}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--sky)',marginBottom:4,display:'flex',alignItems:'center',gap:3}}><ITrend c={11} col="var(--sky)"/>가점 분석</div>
                    <div style={{fontSize:10,color:'var(--dust2)',lineHeight:1.6}}>{analysis.gajeom}</div>
                  </div>
                )}

                {analysis.pros?.length>0&&<div style={{marginBottom:8}}>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--jade)',marginBottom:3}}>✅ 유리한 점</div>
                  {analysis.pros.map((p,i)=><div key={i} style={{fontSize:10,color:'var(--dust2)',marginBottom:2}}>• {p}</div>)}
                </div>}

                {analysis.cons?.length>0&&<div style={{marginBottom:8}}>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--ruby)',marginBottom:3}}>⚠️ 불리한 점</div>
                  {analysis.cons.map((p,i)=><div key={i} style={{fontSize:10,color:'var(--dust2)',marginBottom:2}}>• {p}</div>)}
                </div>}

                {analysis.loan&&(
                  <div style={{padding:'10px',background:'var(--ink3)',borderRadius:9,border:'1px solid var(--line)',marginBottom:9}}>
                    <div style={{fontSize:10,fontWeight:600,color:'var(--dust2)',marginBottom:7}}>대출 예상</div>
                    <div style={{display:'flex',gap:12,marginBottom:5}}>
                      <div><div style={{fontSize:9,color:'var(--dust3)'}}>예상 한도</div><div style={{fontSize:15,fontWeight:700,color:'var(--sky)'}}>{fmtN(analysis.loan.max)}만</div></div>
                      <div><div style={{fontSize:9,color:'var(--dust3)'}}>월 상환(30년)</div><div style={{fontSize:15,fontWeight:700}}>{fmtN(analysis.loan.monthly)}만</div></div>
                    </div>
                    <div style={{fontSize:10,color:'var(--dust3)'}}>{analysis.loan.note}</div>
                  </div>
                )}

                {analysis.advice&&(
                  <div style={{padding:'10px',background:'rgba(109,106,240,.06)',border:'1px solid rgba(109,106,240,.2)',borderRadius:9,marginBottom:9}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--sky2)',marginBottom:5}}>💡 AI 종합 조언</div>
                    <div style={{fontSize:10,color:'var(--dust2)',lineHeight:1.7}}>{analysis.advice}</div>
                  </div>
                )}

                <button className="btn btn-ghost btn-sm" onClick={()=>setAnalysis(null)} style={{width:'100%',justifyContent:'center',fontSize:11}}>다시 분석</button>
              </div>
            )}
          </div>

          <div className="card-sm">
            <button onClick={()=>setChatOpen(o=>!o)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',cursor:'pointer'}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <IMsg c={15} col="var(--sky2)"/>
                <span style={{fontWeight:700,fontSize:14}}>AI 질문하기</span>
                {hist.length>0&&<span style={{padding:'1px 5px',borderRadius:999,background:'var(--sky2)',color:'#fff',fontSize:9,fontWeight:700}}>{hist.length}</span>}
              </div>
              {chatOpen?<IChevU c={13} col="var(--dust3)"/>:<IChevD c={13} col="var(--dust3)"/>}
            </button>

            {chatOpen&&(
              <div style={{marginTop:12}} className="up">
                {hist.length===0&&(
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11,color:'var(--dust3)',marginBottom:7}}>빠른 질문</div>
                    {['내가 이 청약 신청 가능한가요?','중도금 대출 조건이 궁금해요','이 지역 최근 경쟁률이 어때요?'].map(q=>(
                      <button key={q} onClick={()=>setChatQ(q)} style={{display:'block',width:'100%',textAlign:'left',padding:'7px 10px',borderRadius:8,background:'var(--ink3)',border:'1px solid var(--line)',color:'var(--dust2)',fontSize:11,marginBottom:5,cursor:'pointer',transition:'all .15s'}}>{q}</button>
                    ))}
                  </div>
                )}

                {hist.length>0&&(
                  <div style={{maxHeight:240,overflowY:'auto',display:'flex',flexDirection:'column',gap:8,marginBottom:10,padding:2}}>
                    {hist.map((m,i)=>(
                      <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                        <div style={{maxWidth:'88%',padding:'9px 11px',borderRadius:m.role==='user'?'12px 12px 4px 12px':'12px 12px 12px 4px',background:m.role==='user'?'var(--sky)':'var(--ink3)',border:m.role==='assistant'?'1px solid var(--line)':'none',fontSize:11,lineHeight:1.6,color:m.role==='user'?'#fff':'var(--dust)',whiteSpace:'pre-wrap'}}>
                          {m.content}
                        </div>
                      </div>
                    ))}
                    {chatLoading&&<div style={{display:'flex'}}><div style={{padding:'9px 12px',background:'var(--ink3)',border:'1px solid var(--line)',borderRadius:'12px 12px 12px 4px'}}><ILoader c={13} col="var(--sky)"/></div></div>}
                    <div ref={chatEnd}/>
                  </div>
                )}

                <div style={{display:'flex',gap:7}}>
                  <input className="inp" placeholder="청약에 대해 물어보세요…" value={chatQ} onChange={e=>setChatQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doChat()} style={{flex:1,fontSize:12,padding:'8px 11px'}}/>
                  <button onClick={doChat} disabled={chatLoading||!chatQ.trim()} style={{padding:'8px 12px',borderRadius:9,background:'var(--sky)',color:'#fff',opacity:(!chatQ.trim()||chatLoading)?0.45:1,cursor:'pointer',display:'flex',alignItems:'center'}}>
                    <ISend c={13}/>
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

        <div className="card">
          <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}><IBook c={14} col="var(--sky2)"/><span style={{fontWeight:700,fontSize:13}}>청약통장</span></div>
          <Row label="가입 기간" val={`${user.savingsYears||0}년 ${user.savingsMonths||0}개월`}/>
          <Row label="납입 횟수" val={`${user.savingsCount||0}회`} ok={(user.savingsCount||0)>=12} sub="1순위 12회↑, 청년특공 6회↑"/>
          <Row label="공공용 납입총액" val={`${fmtN(user.savingsTotalAmount)}만원`}/>

        </div>
      </div>
    </div>
  );

/* ═══════════════════════════════════════════════
   SETTINGS PAGE
═══════════════════════════════════════════════ */
function SettingsPage({apiKey,onKeySet,user,onUserUpdate}){
  const [tmpK,setTmpK]=useState(apiKey);
  const [showK,setShowK]=useState(false);
  const [kSaved,setKSaved]=useState(false);
  const [pSaved,setPSaved]=useState(false);
  const [nEmail,setNEmail]=useState(()=>localStorage.getItem('notifyEmail')||'');
  const [nStatus,setNStatus]=useState('idle'); // idle | loading | registered | error
  const [nMsg,setNMsg]=useState('');
  React.useEffect(()=>{
    const saved=localStorage.getItem('notifyEmail');
    if(!saved) return;
    fetch(`/api/notify/status?email=${encodeURIComponent(saved)}`)
      .then(r=>r.json()).then(d=>{ if(d.registered) setNStatus('registered'); }).catch(()=>{});
  },[]);
  const registerNotify=async()=>{
    if(!nEmail||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(nEmail)){setNMsg('유효한 이메일을 입력하세요.');return;}
    setNStatus('loading');
    try{
      const r=await fetch('/api/notify/register',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:nEmail,conditions:{interestRegions:lu.interestRegions,budgetLimit:lu.budgetLimit||0}})});
      const d=await r.json();
      if(d.ok){localStorage.setItem('notifyEmail',nEmail);setNStatus('registered');setNMsg('');}
      else{setNStatus('error');setNMsg(d.error||'등록 실패');}
    }catch(e){setNStatus('error');setNMsg('서버 오류');}
  };
  const unregisterNotify=async()=>{
    if(!confirm('이메일 알림 수신을 해지하시겠습니까?')) return;
    await fetch('/api/notify/unregister',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:nEmail})});
    localStorage.removeItem('notifyEmail');setNStatus('idle');setNEmail('');
  };
  const [lu,setLu]=useState({...user});
  const setU=(k,v)=>setLu(u=>({...u,[k]:v}));
  const now=new Date();
  const pma=lu.parentBirthYear?(now.getFullYear()-lu.parentBirthYear-(now.getMonth()+1<(lu.parentBirthMonth||1)?1:0)):0;
  const sCnt=s=>lu.interestRegions.filter(r=>r.startsWith(s+' ')).length;
  const togD=(s,d)=>{const r=s+' '+d;setU('interestRegions',lu.interestRegions.includes(r)?lu.interestRegions.filter(x=>x!==r):[...lu.interestRegions,r]);};
  const clrSido=s=>setU('interestRegions',lu.interestRegions.filter(r=>!r.startsWith(s+' ')));
  const allSelS=s=>(DISTRICTS[s]||[]).every(d=>lu.interestRegions.includes(s+' '+d));
  const togAllS=s=>{if(allSelS(s)){clrSido(s);}else{const ta=(DISTRICTS[s]||[]).map(d=>s+' '+d).filter(r=>!lu.interestRegions.includes(r));setU('interestRegions',[...lu.interestRegions,...ta]);}};
  const saveKey=()=>{onKeySet(tmpK.trim());setKSaved(true);setTimeout(()=>setKSaved(false),2000);};
  const saveProfile=()=>{onUserUpdate(lu);setPSaved(true);setTimeout(()=>setPSaved(false),2000);};

  return (
    <div style={{padding:28,maxWidth:680,margin:'0 auto'}}>
      <div style={{fontSize:20,fontWeight:700,marginBottom:24}}>설정</div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:14}}><IKey c={15} col="var(--sky)"/><span style={{fontWeight:700,fontSize:14}}>Claude API 키</span></div>
        <div style={{fontSize:12,color:'var(--dust2)',lineHeight:1.7,marginBottom:14}}>AI 자격 분석·대출 계산·챗봇 기능에 사용됩니다. 키는 브라우저 로컬스토리지에만 저장되며, 서버로 전송되지 않습니다.</div>
        <div className="fi" style={{marginBottom:10}}>
          <label className="fl">API 키 (sk-ant-...)</label>
          <div style={{position:'relative'}}>
            <input className="inp" type={showK?'text':'password'} placeholder="sk-ant-api03-..." value={tmpK} onChange={e=>setTmpK(e.target.value)} style={{paddingRight:42}}/>
            <button onClick={()=>setShowK(s=>!s)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',color:'var(--dust3)',padding:4,cursor:'pointer'}}>
              {showK?<IEyeOff c={14}/>:<IEye c={14}/>}
            </button>
          </div>
          <span className="fh"><a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{color:'var(--sky)'}}>console.anthropic.com</a>에서 발급 · Claude Sonnet 사용</span>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-sky btn-sm" onClick={saveKey}>
            {kSaved?<><ICheck c={13}/>저장됨</>:'저장'}
          </button>
          <button className="btn btn-ghost btn-sm" onClick={()=>{if(confirm('API 키를 삭제하면 키 입력 화면으로 돌아갑니다.')){onKeySet('');}}} style={{color:'var(--dust3)'}}>
            키 변경

        </div>
      </div>

      <div className="card" style={{marginBottom:16}}>

          <div className="fi" style={{margin:0}}><label className="fl">총 납입 횟수</label><div style={{display:'flex',gap:5,alignItems:'center'}}><input className="inp" type="number" min={0} value={lu.savingsCount} onChange={e=>setU('savingsCount',+e.target.value)} style={{flex:1}}/><span style={{fontSize:11,color:'var(--dust2)'}}>회</span></div></div>
          <div className="fi" style={{margin:0}}><label className="fl">목표 대출 금액 상한</label><div style={{display:'flex',gap:5,alignItems:'center'}}><input className="inp" type="number" min={0} value={lu.targetLoanAmount||0} onChange={e=>setU('targetLoanAmount',+e.target.value)} style={{flex:1}}/><span style={{fontSize:11,color:'var(--dust2)'}}>만원</span></div></div>
        </div>

        <div style={{fontSize:11,fontWeight:700,color:'var(--dust3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:10,paddingBottom:6,borderBottom:'1px solid var(--line)'}}>관심 지역 · 목표 분양가</div>
        {lu.interestRegions.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:10}}>
          {lu.interestRegions.map(r=>(
            <span key={r} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 9px',borderRadius:999,fontSize:11,background:'rgba(74,144,245,.15)',border:'1px solid rgba(74,144,245,.3)',color:'var(--sky)'}}>
              {r}<button onClick={()=>setU('interestRegions',lu.interestRegions.filter(x=>x!==r))} style={{color:'var(--sky)',opacity:.7,fontSize:12,lineHeight:1}}>×</button>
            </span>
          ))}
          <button onClick={()=>setU('interestRegions',[])} style={{fontSize:11,color:'var(--dust3)',padding:'3px 8px',borderRadius:999,border:'1px solid var(--line)',background:'var(--ink3)',cursor:'pointer'}}>전체 해제</button>
        </div>}
        <RegionMap
          selected={lu.interestRegions}
          onToggleDistrict={(s,d)=>togD(s,d)}
          onToggleAll={s=>togAllS(s)}
        />
        {(()=>{const tb=((lu.availableCash||0)+(lu.targetLoanAmount||0));return tb>0&&(<div style={{marginTop:8,padding:'8px 12px',background:'rgba(74,144,245,.05)',border:'1px solid rgba(74,144,245,.15)',borderRadius:8,fontSize:11,color:'var(--dust2)',lineHeight:1.8}}>구매력 상한(매칭 기준): 가용현금 {fmtN(lu.availableCash||0)}만 + 대출상한 {fmtN(lu.targetLoanAmount||0)}만 = <strong style={{color:'var(--sky)'}}>총 {(tb/10000).toFixed(2)}억원</strong><br/><span style={{color:'var(--dust3)',fontSize:10}}>대출 계획 섹션의 가용현금·목표 대출 금액 상한을 수정하면 자동 반영됩니다</span></div>);})()}
        <button className="btn btn-sky" onClick={saveProfile} style={{width:'100%',justifyContent:'center',marginTop:4}}>
          {pSaved?<><ICheck c={14}/>저장됨</>:<><ICheck c={14}/>프로필 저장</>}
        </button>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:12}}><IBell c={15} col="var(--sky)"/><span style={{fontWeight:700,fontSize:14}}>이메일 알림</span></div>
        <div style={{fontSize:12,color:'var(--dust2)',lineHeight:1.7,marginBottom:14}}>매일 오전 8시 공고 갱신 시 등록 조건(관심지역·목표분양가)에 맞는 신규 공고가 있으면 이메일로 알려드립니다.</div>
        {nStatus!=='registered'?(
          <>
            <div className="fi" style={{marginBottom:10}}>
              <label className="fl">이메일 주소</label>
              <input className="inp" type="email" placeholder="example@gmail.com" value={nEmail} onChange={e=>setNEmail(e.target.value)} disabled={nStatus==='loading'}/>
            </div>
            {nMsg&&<div style={{fontSize:11,color:'var(--ruby)',marginBottom:8}}>{nMsg}</div>}
            <button className="btn btn-sky btn-sm" onClick={registerNotify} disabled={nStatus==='loading'}>
              {nStatus==='loading'?<><ILoader c={12}/>등록 중…</>:<><IBell c={12}/>알림 신청</>}
            </button>
          </>
        ):(
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:'rgba(16,185,129,.06)',border:'1px solid rgba(16,185,129,.2)',borderRadius:8}}>
            <div>

          최종 자격 여부는 반드시 <a href="https://applyhome.co.kr" target="_blank" rel="noreferrer" style={{color:'var(--sky)'}}>청약홈(applyhome.co.kr)</a> 또는 전문가를 통해 직접 확인하세요.<br/><br/>
          본 서비스는 어떠한 법적 책임도 지지 않으며, 최종 판단과 책임은 사용자 본인에게 있습니다.

      <div className="card" style={{borderColor:'rgba(240,96,96,.25)'}}>

        <div style={{fontSize:12,color:'var(--dust2)',marginBottom:12}}>모든 데이터(프로필, 즐겨찾기, 설정)가 삭제되고 처음부터 다시 시작합니다.</div>

      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(S.getUser());
  const [apiKey,setApiKey]=useState(S.getKey());
  const [page,setPage]=useState('home');
  const [detailId,setDetailId]=useState(null);

  // 청약 공고 데이터 상태
  const [announcements,setAnnouncements]=useState(DUMMY_FALLBACK);
  const [dataSource,setDataSource]=useState('offline'); // 'loading'|'api'|'offline'
  const [dataError,setDataError]=useState('');

  const setKey=k=>{S.setKey(k);setApiKey(k);};
  const updateUser=d=>{S.setUser(d);setUser(d);};

  // 청약홈 API 데이터 로드 — hooks는 조건부 return 이전에 선언해야 함
  useEffect(()=>{
    if(!user||!apiKey) return;

    // 로컬 캐시 확인 (1시간 내 데이터면 재사용)
    const cached=S.getAnnCache();
    if(cached&&cached.data&&cached.data.length>0){
      setAnnouncements(cached.data);
      setDataSource('api');
      return;
    }

    setDataSource('loading');
    fetch('/api/announcements')
      .then(r=>r.json())
      .then(res=>{
        if(res.ok&&res.data&&res.data.length>0){
          setAnnouncements(res.data);
          setDataSource('api');
          S.setAnnCache(res.data);
          setDataError('');
        } else {
          // API 키 미설정이거나 0건 → 더미 유지
          setDataSource('offline');
          setDataError(res.error||'API 데이터 없음 — 더미 데이터로 동작 중');
        }
      })
      .catch(e=>{
        // 서버 미실행 시 조용히 더미 폴백
        setDataSource('offline');
        setDataError('서버 연결 불가 — 더미 데이터로 동작 중 (server.js를 실행하세요)');
      });
  },[user,apiKey]);

  // hook 이후 조건부 렌더링 — React hooks 규칙 준수
  // 1단계: Claude API 키 없으면 키 입력 화면
  if(!apiKey) return <ApiKeyGate onComplete={k=>{S.setKey(k);setApiKey(k);}}/>;

  // 2단계: 프로필 없으면 온보딩
  if(!user) return <Onboarding onComplete={d=>{S.setUser(d);setUser(d);}}/>;

  // 데이터 로딩 오버레이 (최초 API 호출 중일 때만)
  const loadingOverlay=dataSource==='loading'?(
    <div style={{position:'fixed',bottom:20,right:20,background:'var(--ink2)',border:'1px solid var(--line)',borderRadius:12,padding:'10px 16px',display:'flex',alignItems:'center',gap:8,fontSize:12,color:'var(--dust2)',zIndex:99}}>
      <ILoader c={14} col="var(--sky)"/>청약홈 공고 불러오는 중…
    </div>
  ):null;

  // API 키 미설정 알림 배너 (설정 페이지 외)
  const apiBanner=(dataSource==='offline'&&page!=='settings')?(
    <div style={{position:'fixed',bottom:20,right:20,background:'rgba(240,184,64,.08)',border:'1px solid rgba(240,184,64,.2)',borderRadius:12,padding:'10px 16px',fontSize:11,color:'var(--gold)',zIndex:99,maxWidth:280,lineHeight:1.6}}>
      📡 더미 데이터 표시 중<br/>
      <span style={{color:'var(--dust3)'}}>{dataError}</span>
    </div>
  ):null;

  const renderPage=()=>{
    switch(page){
      case'home':   return <Home user={user} apiKey={apiKey} setPage={setPage} setDid={setDetailId} announcements={announcements}/>;
      case'list':   return <ListPage user={user} setPage={setPage} setDid={setDetailId} announcements={announcements} dataSource={dataSource}/>;
      case'matched':return <ListPage user={user} setPage={setPage} setDid={setDetailId} announcements={announcements} dataSource={dataSource} matchedOnly={true}/>;
      case'detail': return <DetailPage annId={detailId} user={user} apiKey={apiKey} setPage={setPage} announcements={announcements}/>;
      case'profile':return <ProfilePage user={user} setPage={setPage}/>;
      case'settings':return <SettingsPage apiKey={apiKey} onKeySet={setKey} user={user} onUserUpdate={updateUser}/>;
      default:      return <Home user={user} apiKey={apiKey} setPage={setPage} setDid={setDetailId} announcements={announcements}/>;
    }
  };

  return (
    <Layout page={page} setPage={setPage} user={user} apiKey={apiKey} onKeySet={setKey}>
      {renderPage()}
      {loadingOverlay}
      {apiBanner}
    </Layout>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){console.error('React ErrorBoundary caught:',e,info);}
  render(){
    if(this.state.err)return(
      <div style={{background:'#fff',color:'#c00',padding:32,fontFamily:'sans-serif',fontSize:14,lineHeight:1.8,maxWidth:600,margin:'40px auto',borderRadius:8,border:'1px solid #f88'}}>
        <strong>컴포넌트 렌더링 오류</strong><br/><br/>
        {this.state.err.message}<br/>
        <pre style={{fontSize:11,color:'#888',whiteSpace:'pre-wrap',marginTop:8}}>{this.state.err.stack}</pre>
      </div>
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
